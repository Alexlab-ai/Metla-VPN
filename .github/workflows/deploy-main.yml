name: Deploy Main Server

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy
          - restart
          - update
          - logs

  push:
    branches:
      - main
    paths:
      - '*.js'
      - 'package.json'
      - 'ecosystem.config.cjs'
      - 'tarifs.json'
      - 'start_text.txt'
      - 'servers.yml'
      - 'masks.txt'
      - 'files/**'
      - 'static/**'

jobs:
  deploy:
    runs-on: [self-hosted, linux, metla-vpn]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy locally
        run: |
          set -euo pipefail

          APP_DIR="/opt/vpn_bot"
          ACTION="${{ inputs.action || 'deploy' }}"

          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          if command -v nvm >/dev/null 2>&1; then
            nvm use default >/dev/null
          fi

          case "$ACTION" in
            deploy|update)
              echo "=== Deploying Metla VPN ==="

              mkdir -p "$APP_DIR"
              rsync -a --delete \
                --exclude ".git" \
                --exclude ".env" \
                --exclude "node_modules" \
                --exclude "logs" \
                "$GITHUB_WORKSPACE/" "$APP_DIR/"

              cd "$APP_DIR"
              npm install --omit=dev

              pm2 startOrReload ecosystem.config.cjs --env production
              pm2 save

              echo "=== Deploy complete ==="
              pm2 status
              ;;

            restart)
              echo "=== Restarting services ==="
              cd "$APP_DIR"
              pm2 restart ecosystem.config.cjs --env production
              pm2 status
              ;;

            logs)
              echo "=== Recent logs ==="
              pm2 logs --lines 50 --nostream
              ;;
          esac

      - name: Health check
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.action != 'logs' }}
        run: |
          sleep 5
          echo "=== PM2 Status ==="
          pm2 status
          echo ""
          echo "=== Bot logs (last 10 lines) ==="
          pm2 logs Bot --lines 10 --nostream
