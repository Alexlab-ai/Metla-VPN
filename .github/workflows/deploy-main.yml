name: Deploy Main Server

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy
          - restart
          - update
          - logs

  push:
    branches:
      - main
    paths:
      - '*.js'
      - 'package.json'
      - 'ecosystem.config.cjs'
      - 'tarifs.json'
      - 'start_text.txt'
      - 'servers.yml'
      - 'masks.txt'
      - 'files/**'
      - 'static/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync files to server
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.action == 'deploy' || inputs.action == 'update' }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'mkdir -p /opt/vpn_bot'

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude ".git" \
            --exclude ".env" \
            --exclude "node_modules" \
            --exclude "logs" \
            "$GITHUB_WORKSPACE/" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/vpn_bot/"

      - name: Run deploy commands
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
            set -euo pipefail
            APP_DIR="/opt/vpn_bot"
            ACTION="${{ inputs.action || 'deploy' }}"

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            if command -v nvm >/dev/null 2>&1; then
              nvm use default >/dev/null
            fi

            case "$ACTION" in
              deploy|update)
                echo "=== Deploying Metla VPN ==="

                cd "$APP_DIR"
                npm install --omit=dev

                pm2 startOrReload ecosystem.config.cjs --env production
                pm2 save

                echo "=== Deploy complete ==="
                pm2 status
                ;;

              restart)
                echo "=== Restarting services ==="
                cd "$APP_DIR"
                pm2 restart ecosystem.config.cjs --env production
                pm2 status
                ;;

              logs)
                echo "=== Recent logs ==="
                pm2 logs --lines 50 --nostream
                ;;
            esac
          EOF

      - name: Health check
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.action != 'logs' }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
            set -euo pipefail
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            if command -v nvm >/dev/null 2>&1; then
              nvm use default >/dev/null
            fi

            sleep 5
            echo "=== PM2 Status ==="
            pm2 status
            echo ""
            echo "=== Bot logs (last 10 lines) ==="
            pm2 logs Bot --lines 10 --nostream
          EOF
