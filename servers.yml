# Main server (Marzban panel + Bot)
main:
  host: ""                    # IP address of main server
  user: "root"
  description: "Marzban panel + Telegram bot"

# VPN Nodes (Marzban-node instances)
# To add a new node:
#   1. Buy a VPS in desired country
#   2. Add its details below
#   3. Run: GitHub Actions -> Deploy Node -> select node name
#   4. Add node IP in Marzban panel -> Nodes
nodes:
